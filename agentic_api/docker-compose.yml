services:
  # ── Redis: Message broker + Result backend ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentic_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-agentic_secure_redis_pwd}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-agentic_secure_redis_pwd}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI: Endpoint utama ───────────────────────────────────────────────
  agentic_api:
    build: .
    container_name: agentic_api
    command: >
      gunicorn main:app
      -w ${GUNICORN_WORKERS:-2}
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8002
      --timeout 600
    ports:
      - "8002:8002"
    volumes:
      - ../extraction:/app/extraction
      - ../uploads:/app/uploads
      - ../pipeline_output:/app/pipeline_output
      - ../chunks:/app/chunks
      - ../outputs:/app/outputs
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-agentic_secure_redis_pwd}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G

  # ── Celery Worker 1: Khusus generasi chat & teks ringan (Paralel 4) ───────
  celery_worker_default:
    build: .
    container_name: agentic_celery_default
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-6}
      --max-tasks-per-child=500
      -Q celery,generation
      --hostname=default@%h
    volumes:
      - ../uploads:/app/uploads
      - ../pipeline_output:/app/pipeline_output
      - ../chunks:/app/chunks
      - ../outputs:/app/outputs
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-agentic_secure_redis_pwd}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Celery Worker 2: Khusus ekstraksi PDF Docling berat (Tunggal 1) ────────
  celery_worker_pipeline:
    build: .
    container_name: agentic_celery_pipeline
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=10
      -Q pipeline
      --hostname=pipeline@%h
    volumes:
      - ../uploads:/app/uploads
      - ../pipeline_output:/app/pipeline_output
      - ../chunks:/app/chunks
      - ../outputs:/app/outputs
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-agentic_secure_redis_pwd}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3.5G

  # ── Flower: Monitoring dashboard Celery ───────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: agentic_flower
    command: celery --broker=redis://:${REDIS_PASSWORD:-agentic_secure_redis_pwd}@redis:6379/0 flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-agentic_flower_secret_password}
    env_file:
      - ../.env
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
