services:
  agentic_api:
    build: .
    container_name: agentic_api
    command: >
      gunicorn main:app
      -w 1
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8002
      --timeout 600
    ports:
      - "8002:8002"
    volumes:
      # Config & data
      - ./.env:/app/.env
      - ../extraction:/app/extraction
      - ./templates:/app/templates
      - ./bm25_hybrid_new.pkl:/app/bm25_hybrid_new.pkl
      # Pipeline directories (persistent across container restarts)
      - ../uploads:/app/uploads
      - ../pipeline_output:/app/pipeline_output
      - ../chunks:/app/chunks
      - ../outputs:/app/outputs
    env_file:
      - ./.env
    environment:
      - MODEL_API_URL=http://model_api:8003
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
