services:
  model_api:
    build: .
    container_name: model_api
    command: >
      gunicorn model_api:app
      -w 1
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8003
      --timeout 600
    ports:
      - "8003:8003"
    volumes:
      - ./.env:/app/.env
    env_file:
      - ./.env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
